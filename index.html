<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buchregal</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg-from: #0d1117;
  --bg-to: #161b27;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.09);
  --surface-card: rgba(255,255,255,0.06);
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --text: #f0f2f8;
  --text2: rgba(240,242,248,0.6);
  --text3: rgba(240,242,248,0.38);
  --accent: #7c9ef8;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,158,248,0.18);
  --shelf-wood: rgba(255,255,255,0.07);
  --shelf-edge: rgba(255,255,255,0.12);
  --shadow: rgba(0,0,0,0.4);
  --shadow2: rgba(0,0,0,0.65);
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 26px;
}
[data-theme="light"] {
  --bg-from: #f0f4ff;
  --bg-to: #e8edf8;
  --surface: rgba(255,255,255,0.7);
  --surface-hover: rgba(255,255,255,0.9);
  --surface-card: rgba(255,255,255,0.75);
  --glass: rgba(255,255,255,0.65);
  --glass-border: rgba(0,0,0,0.08);
  --text: #0f1624;
  --text2: rgba(15,22,36,0.6);
  --text3: rgba(15,22,36,0.38);
  --accent: #4a7cf0;
  --accent2: #7c5af0;
  --accent-glow: rgba(74,124,240,0.12);
  --shelf-wood: rgba(0,0,0,0.06);
  --shelf-edge: rgba(0,0,0,0.1);
  --shadow: rgba(0,0,0,0.08);
  --shadow2: rgba(0,0,0,0.18);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Roboto', sans-serif;
  min-height: 100vh;
  background: linear-gradient(145deg, var(--bg-from) 0%, var(--bg-to) 100%);
  background-attachment: fixed;
  color: var(--text);
  overflow-x: hidden;
  transition: background .3s, color .3s;
}

/* Ambient orbs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  transition: opacity .4s;
}
[data-theme="dark"] body::before {
  width: 500px; height: 500px;
  top: -100px; left: -100px;
  background: radial-gradient(circle, rgba(124,158,248,0.12), transparent 70%);
}
[data-theme="dark"] body::after {
  width: 400px; height: 400px;
  bottom: 0; right: -80px;
  background: radial-gradient(circle, rgba(167,139,250,0.1), transparent 70%);
}
[data-theme="light"] body::before, [data-theme="light"] body::after { opacity: 0; }

button { font-family: 'Roboto', sans-serif; cursor: pointer; border: none; outline: none; }
input, select, textarea { font-family: 'Roboto', sans-serif; outline: none; }

/* ── LAYOUT WRAPPER ── */
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  padding: 20px 28px 0;
  display: flex; flex-direction: column; gap: 18px;
}

.header-top {
  display: flex; align-items: center; gap: 14px;
}

.logo {
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: -0.03em; color: var(--text);
  margin-right: auto;
}
.logo em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Stats row */
.stats-row {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.stat-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 7px 14px;
  backdrop-filter: blur(12px);
  transition: background .2s;
}
.stat-pill:hover { background: var(--surface-hover); }
.stat-num {
  font-size: 1rem; font-weight: 700; color: var(--text);
  line-height: 1;
}
.stat-lbl {
  font-size: 0.68rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: .07em;
  white-space: nowrap;
}
.stat-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  flex-shrink: 0;
}

.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all .2s;
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface-hover); transform: scale(1.08); }

/* ── HORIZONTAL NAV ── */
.nav-outer {
  padding: 0 28px;
  margin-top: 6px;
}

/* Section tabs: Bookshelf · TBR · Upcoming · All */
.section-tabs {
  display: flex; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
  padding: 4px 0;
}
.section-tabs::-webkit-scrollbar { display: none; }

.sec-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border-radius: 50px;
  font-size: .83rem; font-weight: 500;
  color: var(--text2);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  transition: all .22s;
  white-space: nowrap;
  flex-shrink: 0;
}
.sec-tab:hover { color: var(--text); background: var(--surface-hover); }
.sec-tab.active {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  box-shadow: 0 4px 18px var(--accent-glow);
}
[data-theme="light"] .sec-tab.active { color: #fff; }
.sec-tab-icon { font-size: .9rem; }

/* ── YEAR TABS (sub-navigation for Bookshelf) ── */
.year-tabs-wrap {
  display: none; padding: 10px 28px 0;
}
.year-tabs-wrap.visible { display: block; }
.year-tabs {
  display: flex; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
  padding: 4px 0;
}
.year-tabs::-webkit-scrollbar { display: none; }

.year-tab {
  padding: 6px 16px;
  border-radius: 50px;
  font-size: .8rem; font-weight: 500;
  color: var(--text3);
  background: transparent;
  border: 1px solid var(--glass-border);
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.year-tab:hover { color: var(--text); background: var(--glass); }
.year-tab.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-color: rgba(124,158,248,0.35);
}
.year-tab-add {
  padding: 6px 14px;
  border-radius: 50px;
  font-size: .8rem;
  color: var(--text3);
  background: transparent;
  border: 1px dashed var(--glass-border);
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.year-tab-add:hover { color: var(--accent); border-color: var(--accent); }

/* ── MAIN ── */
.main {
  padding: 24px 28px 40px;
  flex: 1;
}

/* ── SECTION HEADING ── */
.sec-heading {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.sec-heading-title {
  font-size: 1rem; font-weight: 500; color: var(--text2);
  letter-spacing: .01em;
}

/* ── ADD BTN ── */
.add-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px;
  border-radius: 50px;
  font-size: .82rem; font-weight: 500;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid rgba(124,158,248,0.3);
  transition: all .2s;
}
.add-btn:hover {
  background: rgba(124,158,248,0.25);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px var(--accent-glow);
}
.add-btn-icon { font-size: 1rem; font-weight: 300; }

/* ── MONTH / AUTHOR GROUP ── */
.group-section { margin-bottom: 28px; }

.group-header {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: background .18s;
  user-select: none;
}
.group-header:hover { background: var(--surface-hover); }
.group-header.collapsed { border-radius: var(--radius); }

.group-title { font-weight: 500; font-size: .88rem; flex: 1; }
.group-badge {
  padding: 2px 10px;
  border-radius: 20px;
  font-size: .68rem; font-weight: 500;
  background: var(--accent-glow);
  color: var(--accent);
  border: 1px solid rgba(124,158,248,0.2);
}
.group-chevron {
  font-size: .6rem; color: var(--text3);
  transition: transform .22s;
}
.group-header:not(.collapsed) .group-chevron { transform: rotate(180deg); }

.group-body {
  border: 1px solid var(--glass-border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
  background: var(--surface);
  backdrop-filter: blur(8px);
}
.group-body.hidden { display: none; }

/* ── SHELF ── */
.shelf {
  padding: 20px 20px 0;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
  position: relative;
}
.shelf-plank {
  width: 100%;
  height: 13px;
  margin-top: 16px;
  background: var(--shelf-wood);
  border-top: 2px solid var(--shelf-edge);
  box-shadow: 0 5px 16px var(--shadow2);
  border-radius: 0 0 4px 4px;
}

/* ── BOOK ── */
.book {
  position: relative; flex-shrink: 0; cursor: pointer;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  transform-origin: bottom center;
}
.book:hover { transform: translateY(-13px) scale(1.05); z-index: 10; }

.book-cover-img {
  width: 72px; height: 108px;
  border-radius: 3px 8px 8px 3px;
  object-fit: cover; display: block;
  box-shadow: -3px 0 8px rgba(0,0,0,.3), 3px 5px 14px rgba(0,0,0,.35);
}
.book-ph {
  width: 72px; height: 108px;
  border-radius: 3px 8px 8px 3px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 6px; gap: 4px;
  box-shadow: -3px 0 8px rgba(0,0,0,.3), 3px 5px 14px rgba(0,0,0,.35);
  position: relative; overflow: hidden;
}
.book-ph::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 9px; background: rgba(0,0,0,.22);
}
.book-ph-emoji { font-size: 1.3rem; z-index: 1; }
.book-ph-title {
  font-size: .52rem; font-weight: 700; text-align: center;
  color: rgba(255,255,255,.9); line-height: 1.25;
  max-height: 46px; overflow: hidden; word-break: break-word; z-index: 1;
}

/* book pastel fills – visible in both themes */
.pal-0 { background: linear-gradient(155deg,#fbc2eb,#a18cd1); }
.pal-1 { background: linear-gradient(155deg,#a1c4fd,#c2e9fb); }
.pal-2 { background: linear-gradient(155deg,#d4fc79,#96e6a1); }
.pal-3 { background: linear-gradient(155deg,#ffecd2,#fcb69f); }
.pal-4 { background: linear-gradient(155deg,#a8edea,#fed6e3); }
.pal-5 { background: linear-gradient(155deg,#fdfcfb,#e2d1c3); }
.pal-6 { background: linear-gradient(155deg,#c3cfe2,#f5f7fa); }
.pal-7 { background: linear-gradient(155deg,#fddb92,#d1fdff); }

/* Tooltip */
.book-tt {
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  background: rgba(15,18,30,0.95);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: var(--radius);
  padding: 10px 12px;
  white-space: normal; min-width: 140px; max-width: 190px;
  pointer-events: none; opacity: 0; transition: opacity .15s;
  z-index: 30;
  box-shadow: 0 12px 32px rgba(0,0,0,.5);
  backdrop-filter: blur(16px);
}
[data-theme="light"] .book-tt {
  background: rgba(255,255,255,.96);
  border-color: rgba(0,0,0,.1);
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
}
.book:hover .book-tt { opacity: 1; }
.tt-title { font-size: .8rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.tt-author { font-size: .7rem; color: var(--text2); margin-bottom: 3px; }
.tt-stars { font-size: .72rem; color: #f5c842; }
.tt-genre {
  display: inline-block; margin-top: 4px;
  font-size: .65rem; padding: 2px 7px;
  background: var(--accent-glow); color: var(--accent);
  border-radius: 20px;
}

/* ── ALL VIEW ── */
.all-list { display: flex; flex-direction: column; gap: 8px; }
.all-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all .18s;
}
.all-row:hover { background: var(--surface-hover); transform: translateX(3px); }
.all-mini-img {
  width: 38px; height: 56px;
  border-radius: 2px 6px 6px 2px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 2px 8px var(--shadow);
}
.all-mini-ph {
  width: 38px; height: 56px;
  border-radius: 2px 6px 6px 2px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
}
.all-info { flex: 1; min-width: 0; }
.all-title { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.all-sub { font-size: .75rem; color: var(--text2); margin-top: 2px; }
.all-stars { font-size: .7rem; color: #f5c842; margin-top: 3px; }
.all-date { font-size: .7rem; color: var(--text3); white-space: nowrap; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(8px);
  z-index: 500; align-items: center; justify-content: center; padding: 16px;
}
.overlay.open { display: flex; }

.modal {
  background: rgba(18,22,36,.92);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: var(--radius-xl);
  padding: 28px;
  width: 100%; max-width: 440px; max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,.6);
  backdrop-filter: blur(24px);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.1) transparent;
}
[data-theme="light"] .modal {
  background: rgba(255,255,255,.92);
  border-color: rgba(0,0,0,.09);
  box-shadow: 0 24px 60px rgba(0,0,0,.22);
}

.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.modal-hdr h2 { font-size: 1.05rem; font-weight: 700; }
.modal-x {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; color: var(--text2); transition: all .15s;
}
.modal-x:hover { background: var(--surface-hover); color: var(--text); }

/* Cover zone */
.cover-zone {
  border: 2px dashed rgba(124,158,248,.3);
  border-radius: var(--radius);
  padding: 18px; text-align: center;
  cursor: pointer; transition: all .2s; margin-bottom: 16px;
  position: relative;
}
.cover-zone:hover, .cover-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.cover-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.cover-prev-img {
  width: 70px; height: 105px; object-fit: cover;
  border-radius: 3px; margin: 0 auto 6px; display: block;
  box-shadow: 0 4px 14px var(--shadow2);
}
.cz-icon { font-size: 1.7rem; margin-bottom: 4px; }
.cz-hint { font-size: .74rem; color: var(--text3); line-height: 1.5; }
.cz-hint strong { color: var(--accent); }

/* Fields */
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: .69rem;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: .08em; font-weight: 500; margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  color: var(--text); font-size: .9rem;
  transition: border-color .2s, background .2s;
  backdrop-filter: blur(8px);
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.field textarea { height: 68px; resize: vertical; }
.field input::placeholder, .field textarea::placeholder { color: var(--text3); }
.field select option { background: #161b27; color: var(--text); }
[data-theme="light"] .field select option { background: #fff; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Stars */
.stars-row { display: flex; gap: 4px; }
.star-btn {
  font-size: 1.5rem; color: rgba(255,255,255,.18);
  cursor: pointer; transition: color .12s, transform .1s;
  background: none; border: none; padding: 0;
}
[data-theme="light"] .star-btn { color: rgba(0,0,0,.15); }
.star-btn:hover, .star-btn.on { color: #f5c842; }
.star-btn:hover { transform: scale(1.18); }

/* Buttons */
.modal-actions { display: flex; gap: 10px; margin-top: 22px; }
.btn-primary {
  flex: 1; padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 50px;
  font-weight: 500; font-size: .9rem; color: #fff;
  transition: all .18s;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px var(--accent-glow); }
.btn-secondary {
  padding: 11px 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  font-size: .9rem; color: var(--text2);
  transition: all .18s;
}
.btn-secondary:hover { background: var(--surface-hover); color: var(--text); }
.btn-danger {
  padding: 11px 14px;
  background: rgba(220,80,80,.1);
  color: #e05252;
  border: 1px solid rgba(220,80,80,.2);
  border-radius: 50px; font-size: .9rem;
  transition: all .18s;
}
.btn-danger:hover { background: rgba(220,80,80,.2); }

/* ── DETAIL ── */
.det-modal {
  background: rgba(18,22,36,.94);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: var(--radius-xl); padding: 28px;
  width: 100%; max-width: 460px;
  box-shadow: 0 32px 80px rgba(0,0,0,.6);
  backdrop-filter: blur(24px);
  display: flex; flex-direction: column; gap: 16px;
}
[data-theme="light"] .det-modal {
  background: rgba(255,255,255,.93);
  border-color: rgba(0,0,0,.09);
}
.det-top { display: flex; gap: 18px; }
.det-cover {
  width: 90px; min-width: 90px; height: 135px;
  border-radius: 3px 10px 10px 3px; object-fit: cover;
  box-shadow: -3px 0 10px rgba(0,0,0,.4), 5px 7px 20px rgba(0,0,0,.4);
}
.det-ph {
  width: 90px; min-width: 90px; height: 135px;
  border-radius: 3px 10px 10px 3px; font-size: 2rem;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  box-shadow: -3px 0 10px rgba(0,0,0,.4), 5px 7px 20px rgba(0,0,0,.4);
  position: relative; overflow: hidden;
}
.det-ph::before { content:''; position:absolute; left:0;top:0;bottom:0;width:10px;background:rgba(0,0,0,.2); }
.det-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.det-author { font-size: .82rem; color: var(--text2); margin-bottom: 8px; }
.det-stars { font-size: .88rem; color: #f5c842; }
.det-meta { font-size: .74rem; color: var(--text3); margin-top: 5px; }
.det-genre-pill {
  display: inline-block; margin-top: 6px;
  padding: 3px 10px; border-radius: 20px;
  font-size: .68rem; font-weight: 500;
  background: var(--accent-glow); color: var(--accent);
  border: 1px solid rgba(124,158,248,.2);
}
.det-notes {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 13px;
  font-size: .83rem; color: var(--text2); line-height: 1.65; font-style: italic;
  backdrop-filter: blur(8px);
}
.det-notes-lbl { font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 5px; font-style: normal; font-weight: 500; }
.det-actions { display: flex; gap: 10px; }

/* ── YEAR MODAL ── */
.modal-sm { max-width: 300px; }

/* ── EMPTY ── */
.empty-state {
  text-align: center; padding: 52px 24px; color: var(--text3);
}
.empty-state .big { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: .88rem; line-height: 1.6; }

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .header { padding: 16px 16px 0; }
  .nav-outer, .year-tabs-wrap { padding-left: 16px; padding-right: 16px; }
  .main { padding: 20px 16px 40px; }
  .stat-lbl { display: none; }
  .stat-num { font-size: .92rem; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="logo">buch<em>regal</em></div>
      <div class="stats-row" id="statsRow"></div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Modus wechseln">☀️</button>
    </div>
  </header>

  <!-- SECTION TABS -->
  <div class="nav-outer" style="padding-top:14px">
    <div class="section-tabs" id="sectionTabs"></div>
  </div>

  <!-- YEAR TABS (shown only for Bookshelf) -->
  <div class="year-tabs-wrap" id="yearTabsWrap">
    <div class="year-tabs" id="yearTabs"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent"></main>

</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="addOverlay" onclick="bgClick(event,'addOverlay')">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="addTitle">Buch hinzufügen</h2>
      <button class="modal-x" onclick="closeAdd()">✕</button>
    </div>
    <div class="cover-zone" id="coverZone"
         ondragover="czOver(event)" ondragleave="czLeave()" ondrop="czDrop(event)">
      <input type="file" accept="image/*" id="coverInput" onchange="coverChange(event)">
      <div id="coverPrevWrap">
        <div class="cz-icon">🖼️</div>
        <div class="cz-hint">Cover hochladen<br><strong>Klicken oder Bild reinziehen</strong></div>
      </div>
    </div>
    <div class="field"><label>Titel *</label><input type="text" id="fTitle" placeholder="Buchtitel"></div>
    <div class="field"><label>Autor/in</label><input type="text" id="fAuthor" placeholder="Name"></div>
    <div id="extraFields"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAdd()">Abbrechen</button>
      <button id="delBtnM" class="btn-danger" style="display:none" onclick="deleteBook()">Löschen</button>
      <button class="btn-primary" onclick="saveBook()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detOverlay" onclick="bgClick(event,'detOverlay')">
  <div class="det-modal" id="detContent"></div>
</div>

<!-- ADD YEAR MODAL -->
<div class="overlay" id="yearOverlay" onclick="bgClick(event,'yearOverlay')">
  <div class="modal modal-sm">
    <div class="modal-hdr">
      <h2>Jahr hinzufügen</h2>
      <button class="modal-x" onclick="closeYearModal()">✕</button>
    </div>
    <div class="field"><label>Jahr</label>
      <input type="number" id="yearInput" placeholder="z. B. 2027" min="2000" max="2100">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeYearModal()">Abbrechen</button>
      <button class="btn-primary" onclick="confirmYear()">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ───
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const SECTIONS = [
  { id:'bookshelf', label:'Bookshelf', icon:'📚' },
  { id:'tbr',       label:'To Be Read', icon:'📖' },
  { id:'upcoming',  label:'Upcoming',  icon:'🗓️' },
  { id:'all',       label:'All Books', icon:'✨' },
];

const GENRE_EMOJI = g => {
  if(!g) return '📚';
  const s = g.toLowerCase();
  if(s.includes('fantasy')) return '🔮';
  if(s.includes('krimi')||s.includes('thriller')) return '🔪';
  if(s.includes('sci')||s==='sf') return '🚀';
  if(s.includes('roman')||s.includes('liebe')||s.includes('romance')) return '💌';
  if(s.includes('horror')) return '💀';
  if(s.includes('histor')) return '🏛️';
  if(s.includes('bio')) return '👤';
  return '📚';
};

// ─── STATE ───
let db = { books:[], years:[2025,2026], collapsed:{} };
let activeSection = 'bookshelf';
let activeYear = new Date().getFullYear();
let editId = null, addMode = 'bookshelf';
let coverData = null, curRating = 0;
let isDark = true;

// ─── PERSIST ───
function load(){
  try{ const d=JSON.parse(localStorage.getItem('br_v4')||'null'); if(d) db=d; }catch{}
  const t = localStorage.getItem('br_theme')||'dark';
  isDark = t==='dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}
function persist(){ localStorage.setItem('br_v4', JSON.stringify(db)); }

// ─── THEME ───
function toggleTheme(){
  isDark = !isDark;
  const t = isDark?'dark':'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = isDark?'☀️':'🌙';
  localStorage.setItem('br_theme', t);
}

// ─── HELPERS ───
function pal(t){ return (t.charCodeAt(0)||0)%8; }
function stars(r){ return r?'★'.repeat(r)+'☆'.repeat(5-r):''; }
function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ─── STATS ───
function renderStats(){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const read = db.books.filter(b=>b.type==='bookshelf');
  const total = read.length;
  const yearly = read.filter(b=>b.readDate && new Date(b.readDate).getFullYear()===y).length;
  const monthly = read.filter(b=>b.readDate && new Date(b.readDate).getFullYear()===y && new Date(b.readDate).getMonth()===m).length;
  const sub = db.books.filter(b=>b.type==='tbr').length;
  document.getElementById('statsRow').innerHTML = [
    [total,'Gesamt'],[yearly,y+''],[monthly,'Monat'],[sub,'SUB']
  ].map(([n,l])=>`<div class="stat-pill"><span class="stat-dot"></span><span class="stat-num">${n}</span><span class="stat-lbl">${l}</span></div>`).join('');
}

// ─── SECTION TABS ───
function renderSectionTabs(){
  document.getElementById('sectionTabs').innerHTML = SECTIONS.map(s=>`
    <button class="sec-tab ${activeSection===s.id?'active':''}" onclick="setSection('${s.id}')">
      <span class="sec-tab-icon">${s.icon}</span>${s.label}
    </button>`).join('');
}

// ─── YEAR TABS ───
function renderYearTabs(){
  const wrap = document.getElementById('yearTabsWrap');
  if(activeSection!=='bookshelf'){ wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');
  const years = [...db.years].sort((a,b)=>a-b);
  document.getElementById('yearTabs').innerHTML =
    years.map(y=>`<button class="year-tab ${activeYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`).join('')
    + `<button class="year-tab-add" onclick="openYearModal()">＋ Jahr</button>`;
}

function setSection(s){
  activeSection = s;
  if(s==='bookshelf' && !db.years.includes(activeYear)) activeYear = db.years[db.years.length-1]||new Date().getFullYear();
  render();
}
function setYear(y){ activeYear=y; render(); }

// ─── COVER ELEMENTS ───
function coverEl(b,w,h){
  if(b.cover) return `<img class="book-cover-img" src="${b.cover}" style="width:${w}px;height:${h}px" alt="">`;
  return `<div class="book-ph pal-${pal(b.title)}" style="width:${w}px;height:${h}px"><span class="book-ph-emoji">${GENRE_EMOJI(b.genre)}</span><span class="book-ph-title">${b.title}</span></div>`;
}
function detCoverEl(b){
  if(b.cover) return `<img class="det-cover" src="${b.cover}" alt="">`;
  return `<div class="det-ph pal-${pal(b.title)}"><span style="font-size:2rem">${GENRE_EMOJI(b.genre)}</span></div>`;
}

// ─── SHELF BOOK ───
function shelfBook(b){
  const s=stars(b.rating);
  return `<div class="book" onclick="openDet('${b.id}')">
    ${coverEl(b,72,108)}
    <div class="book-tt">
      <div class="tt-title">${b.title}</div>
      <div class="tt-author">${b.author||'—'}</div>
      ${s?`<div class="tt-stars">${s}</div>`:''}
      ${b.genre?`<span class="tt-genre">${b.genre}</span>`:''}
    </div>
  </div>`;
}

// ─── COLLAPSIBLE GROUP ───
function renderGroup(key, title, badgeCount, books, collapsed){
  const isCollapsed = !!db.collapsed[key];
  return `<div class="group-section">
    <div class="group-header ${isCollapsed?'collapsed':''}" onclick="toggleGroup('${key}')">
      <span class="group-title">${title}</span>
      <span class="group-badge">${badgeCount}</span>
      <span class="group-chevron">▼</span>
    </div>
    <div class="group-body ${isCollapsed?'hidden':''}">
      <div class="shelf">
        ${books.length ? books.map(shelfBook).join('') : `<p style="font-size:.8rem;color:var(--text3);padding:12px 0">Noch keine Bücher</p>`}
        <div class="shelf-plank"></div>
      </div>
    </div>
  </div>`;
}

function toggleGroup(key){
  db.collapsed[key] = !db.collapsed[key];
  persist(); renderMain();
}

// ─── RENDER BOOKSHELF ───
function renderBookshelf(){
  const books = db.books.filter(b=>b.type==='bookshelf' && b.readYear===activeYear);
  let html = `<div class="sec-heading">
    <span class="sec-heading-title">Bookshelf ${activeYear}</span>
    <button class="add-btn" onclick="openAdd('bookshelf')"><span class="add-btn-icon">＋</span>Buch hinzufügen</button>
  </div>`;
  if(!books.length && !MONTHS.some(()=>true)){
    html += `<div class="empty-state"><div class="big">📭</div><p>Noch keine Bücher für ${activeYear}.</p></div>`;
  } else {
    for(let m=0; m<12; m++){
      const mb = books.filter(b=>b.readMonth===m);
      html += renderGroup(`bs-${activeYear}-${m}`, MONTHS[m], `${mb.length} Bücher`, mb);
    }
  }
  return html;
}

// ─── RENDER TBR ───
function renderTBR(){
  const books = db.books.filter(b=>b.type==='tbr');
  let html = `<div class="sec-heading">
    <span class="sec-heading-title">To Be Read</span>
    <button class="add-btn" onclick="openAdd('tbr')"><span class="add-btn-icon">＋</span>Buch hinzufügen</button>
  </div>`;
  if(!books.length){
    return html + `<div class="empty-state"><div class="big">📚</div><p>Dein SUB ist leer – Zeit zum Sammeln!</p></div>`;
  }
  const authors = [...new Set(books.map(b=>b.author||'Unbekannt'))].sort();
  for(const a of authors){
    const ab = books.filter(b=>(b.author||'Unbekannt')===a);
    html += renderGroup(`tbr-${a}`, a, `${ab.length}`, ab);
  }
  return html;
}

// ─── RENDER UPCOMING ───
function renderUpcoming(){
  const books = db.books.filter(b=>b.type==='upcoming');
  let html = `<div class="sec-heading">
    <span class="sec-heading-title">Upcoming Books</span>
    <button class="add-btn" onclick="openAdd('upcoming')"><span class="add-btn-icon">＋</span>Buch hinzufügen</button>
  </div>`;
  if(!books.length){
    return html + `<div class="empty-state"><div class="big">🌟</div><p>Noch keine kommenden Bücher.</p></div>`;
  }
  const sorted = [...books].sort((a,b)=>(a.releaseDate||'9999').localeCompare(b.releaseDate||'9999'));
  const groups = {};
  for(const b of sorted){
    const k = b.releaseDate ? (() => { const d=new Date(b.releaseDate); return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`; })() : 'zz-unbekannt';
    if(!groups[k]) groups[k]=[];
    groups[k].push(b);
  }
  for(const k of Object.keys(groups)){
    let label;
    if(k==='zz-unbekannt'){ label='Datum unbekannt'; }
    else { const [yr,mo]=k.split('-'); label=`${MONTHS[parseInt(mo)]} ${yr}`; }
    html += renderGroup(`up-${k}`, label, `${groups[k].length}`, groups[k]);
  }
  return html;
}

// ─── RENDER ALL ───
function renderAll(){
  const books = [...db.books.filter(b=>b.type==='bookshelf')]
    .sort((a,b)=>(b.readDate||'').localeCompare(a.readDate||''));
  let html = `<div class="sec-heading"><span class="sec-heading-title">Alle gelesenen Bücher</span></div>`;
  if(!books.length){
    return html + `<div class="empty-state"><div class="big">📭</div><p>Noch keine Bücher gelesen.</p></div>`;
  }
  const rows = books.map(b=>{
    const cov = b.cover
      ? `<img class="all-mini-img" src="${b.cover}" alt="">`
      : `<div class="all-mini-ph pal-${pal(b.title)}">${GENRE_EMOJI(b.genre)}</div>`;
    const s=stars(b.rating);
    return `<div class="all-row" onclick="openDet('${b.id}')">
      ${cov}
      <div class="all-info">
        <div class="all-title">${b.title}</div>
        <div class="all-sub">${b.author||'—'}${b.genre?' · '+b.genre:''}</div>
        ${s?`<div class="all-stars">${s}</div>`:''}
      </div>
      <div class="all-date">${fmtDate(b.readDate)}</div>
    </div>`;
  }).join('');
  return html + `<div class="all-list">${rows}</div>`;
}

// ─── MAIN RENDER ───
function renderMain(){
  let html = '';
  if(activeSection==='bookshelf') html=renderBookshelf();
  else if(activeSection==='tbr') html=renderTBR();
  else if(activeSection==='upcoming') html=renderUpcoming();
  else html=renderAll();
  document.getElementById('mainContent').innerHTML = html;
}

function render(){
  renderStats(); renderSectionTabs(); renderYearTabs(); renderMain();
}

// ─── DETAIL ───
function openDet(id){
  const b=db.books.find(x=>x.id===id); if(!b) return;
  const s=stars(b.rating);
  let extra='';
  if(b.type==='bookshelf') extra=`<div class="det-meta">📅 Gelesen: ${fmtDate(b.readDate)||'—'}</div>`;
  if(b.type==='upcoming') extra=`<div class="det-meta">🗓️ Erscheint: ${fmtDate(b.releaseDate)||'—'}</div>`;
  document.getElementById('detContent').innerHTML=`
    <div class="det-top">
      ${detCoverEl(b)}
      <div style="flex:1;min-width:0">
        <div class="det-title">${b.title}</div>
        <div class="det-author">${b.author||'Unbekannter Autor'}</div>
        ${s?`<div class="det-stars">${s}</div>`:''}
        ${b.genre?`<div class="det-genre-pill">${b.genre}</div>`:''}
        ${extra}
      </div>
    </div>
    ${b.notes?`<div class="det-notes"><div class="det-notes-lbl">Notizen</div>${b.notes}</div>`:''}
    <div class="det-actions">
      <button class="btn-secondary" style="flex:1" onclick="document.getElementById('detOverlay').classList.remove('open')">Schließen</button>
      <button class="btn-primary" style="flex:1" onclick="startEdit('${b.id}')">✎ Bearbeiten</button>
    </div>`;
  document.getElementById('detOverlay').classList.add('open');
}
function startEdit(id){
  document.getElementById('detOverlay').classList.remove('open');
  const b=db.books.find(x=>x.id===id); if(!b) return;
  openAdd(b.type,b);
}

// ─── ADD / EDIT ───
function openAdd(mode, book){
  addMode=mode; editId=book?book.id:null;
  curRating=book?(book.rating||0):0; coverData=book?(book.cover||null):null;
  document.getElementById('addTitle').textContent=book?'Buch bearbeiten':'Buch hinzufügen';
  document.getElementById('fTitle').value=book?book.title:'';
  document.getElementById('fAuthor').value=book?(book.author||''):'';
  document.getElementById('delBtnM').style.display=book?'flex':'none';

  let extra='';
  if(mode==='bookshelf'){
    extra=`
      <div class="row2">
        <div class="field"><label>Genre</label><input type="text" id="fGenre" placeholder="z. B. Fantasy" value="${book?.genre||''}"></div>
        <div class="field"><label>Lesedatum</label><input type="date" id="fReadDate" value="${book?.readDate?book.readDate.slice(0,10):''}"></div>
      </div>
      <div class="field"><label>Bewertung</label>
        <div class="stars-row">${[1,2,3,4,5].map(v=>`<button class="star-btn ${book&&book.rating>=v?'on':''}" data-v="${v}" onclick="setStar(${v})">★</button>`).join('')}</div>
      </div>
      <div class="field"><label>Notizen (optional)</label><textarea id="fNotes" placeholder="Gedanken, Zitate…">${book?.notes||''}</textarea></div>`;
  } else if(mode==='tbr'){
    extra=`
      <div class="field"><label>Genre</label><input type="text" id="fGenre" placeholder="z. B. Fantasy" value="${book?.genre||''}"></div>
      <div class="field"><label>Bewertung (optional)</label>
        <div class="stars-row">${[1,2,3,4,5].map(v=>`<button class="star-btn ${book&&book.rating>=v?'on':''}" data-v="${v}" onclick="setStar(${v})">★</button>`).join('')}</div>
      </div>
      <div class="field"><label>Notizen</label><textarea id="fNotes" placeholder="Warum möchtest du das Buch lesen?">${book?.notes||''}</textarea></div>`;
  } else if(mode==='upcoming'){
    extra=`<div class="field"><label>Erscheinungsdatum</label><input type="date" id="fReleaseDate" value="${book?.releaseDate?book.releaseDate.slice(0,10):''}"></div>`;
  }
  document.getElementById('extraFields').innerHTML=extra;
  if(book?.cover) showCover(book.cover); else resetCover();
  document.getElementById('addOverlay').classList.add('open');
}
function closeAdd(){ document.getElementById('addOverlay').classList.remove('open'); }

function setStar(v){ curRating=curRating===v?0:v; document.querySelectorAll('.star-btn').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.v)<=curRating)); }

function saveBook(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ alert('Bitte einen Titel eingeben.'); return; }
  const author=document.getElementById('fAuthor').value.trim();
  const genre=document.getElementById('fGenre')?.value.trim()||'';
  const notes=document.getElementById('fNotes')?.value.trim()||'';
  let readDate=null, readYear=null, readMonth=null, releaseDate=null;
  if(addMode==='bookshelf'){
    const rd=document.getElementById('fReadDate')?.value;
    if(rd){ readDate=rd; const d=new Date(rd); readYear=d.getFullYear(); readMonth=d.getMonth(); }
    else { const n=new Date(); readDate=n.toISOString().slice(0,10); readYear=activeYear; readMonth=n.getMonth(); }
  }
  if(addMode==='upcoming') releaseDate=document.getElementById('fReleaseDate')?.value||null;
  const book={ id:editId||Date.now().toString(), type:addMode, title, author, genre, notes, cover:coverData, rating:curRating, readDate, readYear, readMonth, releaseDate, added:editId?(db.books.find(x=>x.id===editId)||{}).added:new Date().toISOString() };
  db.books = editId ? db.books.map(x=>x.id===editId?book:x) : [...db.books,book];
  persist(); closeAdd(); render();
}
function deleteBook(){
  if(!confirm('Dieses Buch wirklich löschen?')) return;
  db.books=db.books.filter(x=>x.id!==editId);
  persist(); closeAdd(); render();
}

// ─── YEAR MODAL ───
function openYearModal(){ document.getElementById('yearInput').value=''; document.getElementById('yearOverlay').classList.add('open'); }
function closeYearModal(){ document.getElementById('yearOverlay').classList.remove('open'); }
function confirmYear(){
  const y=parseInt(document.getElementById('yearInput').value);
  if(!y||y<2000||y>2100){ alert('Bitte ein gültiges Jahr eingeben.'); return; }
  if(!db.years.includes(y)){ db.years.push(y); persist(); }
  activeYear=y; closeYearModal(); render();
}

// ─── COVER ───
function coverChange(e){ const f=e.target.files[0]; if(f) readCover(f); }
function czOver(e){ e.preventDefault(); document.getElementById('coverZone').classList.add('dragover'); }
function czLeave(){ document.getElementById('coverZone').classList.remove('dragover'); }
function czDrop(e){ e.preventDefault(); document.getElementById('coverZone').classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) readCover(f); }
function readCover(f){ const r=new FileReader(); r.onload=ev=>{ coverData=ev.target.result; showCover(coverData); }; r.readAsDataURL(f); }
function showCover(s){ document.getElementById('coverPrevWrap').innerHTML=`<img class="cover-prev-img" src="${s}" alt=""><div class="cz-hint"><strong>Anderes Bild wählen</strong></div>`; }
function resetCover(){ coverData=null; document.getElementById('coverPrevWrap').innerHTML=`<div class="cz-icon">🖼️</div><div class="cz-hint">Cover hochladen<br><strong>Klicken oder Bild reinziehen</strong></div>`; }

function bgClick(e,id){ if(e.target.id===id) document.getElementById(id).classList.remove('open'); }

// ─── DEMO DATA ───
function seed(){
  const y=new Date().getFullYear();
  db.books=[
    {id:'d1',type:'bookshelf',title:'Der Hobbit',author:'J.R.R. Tolkien',genre:'Fantasy',rating:5,notes:'Absoluter Klassiker.',cover:null,readDate:`${y}-01-15`,readYear:y,readMonth:0},
    {id:'d2',type:'bookshelf',title:'Shōgun',author:'James Clavell',genre:'Historisch',rating:4,notes:'Fesselnd.',cover:null,readDate:`${y}-01-28`,readYear:y,readMonth:0},
    {id:'d3',type:'bookshelf',title:'Papillon',author:'Henri Charrière',genre:'Biografie',rating:4,notes:'',cover:null,readDate:`${y}-02-10`,readYear:y,readMonth:1},
    {id:'d4',type:'bookshelf',title:'Die Mitternachtsbibliothek',author:'Matt Haig',genre:'Roman',rating:4,notes:'Berührend.',cover:null,readDate:`${y}-03-05`,readYear:y,readMonth:2},
    {id:'d5',type:'tbr',title:'Dune',author:'Frank Herbert',genre:'Sci-Fi',rating:0,notes:'Unbedingt lesen!',cover:null},
    {id:'d6',type:'tbr',title:'Das Lied von Eis und Feuer',author:'George R.R. Martin',genre:'Fantasy',rating:0,notes:'',cover:null},
    {id:'d7',type:'tbr',title:'1984',author:'George Orwell',genre:'Dystopie',rating:0,notes:'',cover:null},
    {id:'d8',type:'upcoming',title:'The Wind and Truth',author:'Brandon Sanderson',genre:'Fantasy',rating:0,notes:'',cover:null,releaseDate:'2025-12-06'},
    {id:'d9',type:'upcoming',title:'Winds of Winter',author:'George R.R. Martin',genre:'Fantasy',rating:0,notes:'',cover:null,releaseDate:'2026-03-01'},
  ];
  if(!db.years.includes(y)) db.years.push(y);
  persist();
}
