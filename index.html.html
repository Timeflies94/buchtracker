<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buchregal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap');
:root {
  --bg:#0f0f13; --surface:#18181f; --surface2:#22222c; --border:#2e2e3a;
  --text:#f0eff8; --muted:#7a798a; --accent:#e8a44a; --accent2:#c46b3a;
  --green:#4caf7d; --blue:#5b8dee; --red:#e05252; --purple:#9b7fe8;
  --shelf:#1a1814; --shelf-edge:#2a2318;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

header{display:flex;align-items:center;gap:16px;padding:18px 28px;background:rgba(15,15,19,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;}
.logo span{color:var(--accent);}
.header-stats{margin-left:auto;display:flex;gap:20px;}
.hstat{text-align:center;}
.hstat-num{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent);line-height:1;}
.hstat-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.add-btn{display:flex;align-items:center;gap:8px;background:var(--accent);color:#0f0f13;border:none;border-radius:10px;padding:9px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.add-btn:hover{background:#f0b55a;transform:translateY(-1px);}

nav{display:flex;gap:0;padding:14px 28px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
nav::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:7px;padding:8px 16px 12px;color:var(--muted);cursor:pointer;font-size:0.82rem;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.18s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:0.5;}
.nav-tab.active .nav-dot{opacity:1;}
.nav-count{background:var(--surface2);color:var(--muted);font-size:0.68rem;padding:1px 6px;border-radius:20px;}
.nav-tab.active .nav-count{background:var(--accent);color:#0f0f13;}

.main{padding:28px;}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.search-wrap{position:relative;flex:1;max-width:340px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:0.88rem;transition:border-color 0.2s;}
.search-wrap input:focus{outline:none;border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);}

.shelf-section{margin-bottom:44px;}
.shelf-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.shelf-label::after{content:'';flex:1;height:1px;background:var(--border);}

.shelf{background:var(--shelf);border-radius:4px 4px 0 0;padding:20px 20px 0;position:relative;min-height:160px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;}
.shelf::after{content:'';position:absolute;bottom:-16px;left:-4px;right:-4px;height:16px;background:linear-gradient(180deg,var(--shelf-edge) 0%,#100e0a 100%);border-radius:0 0 4px 4px;box-shadow:0 8px 24px rgba(0,0,0,0.8);}
.shelf-floor{height:16px;width:100%;}

.book-item{position:relative;cursor:pointer;flex-shrink:0;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);transform-origin:bottom center;}
.book-item:hover{transform:translateY(-14px) scale(1.04);z-index:10;}
.book-cover{width:78px;height:118px;border-radius:3px 7px 7px 3px;object-fit:cover;display:block;box-shadow:-4px 0 8px rgba(0,0,0,0.7),4px 5px 16px rgba(0,0,0,0.55);}
.book-ph{width:78px;height:118px;border-radius:3px 7px 7px 3px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;gap:4px;box-shadow:-4px 0 8px rgba(0,0,0,0.7),4px 5px 16px rgba(0,0,0,0.55);position:relative;overflow:hidden;}
.book-ph::before{content:'';position:absolute;left:0;top:0;bottom:0;width:9px;background:rgba(0,0,0,0.3);}
.ph-emoji{font-size:1.5rem;}
.ph-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.58rem;text-align:center;color:rgba(255,255,255,0.88);line-height:1.25;max-height:50px;overflow:hidden;word-break:break-word;}

.status-pip{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.5);}
.prog-chip{position:absolute;bottom:6px;right:5px;background:rgba(0,0,0,0.7);color:var(--accent);font-size:0.55rem;font-weight:700;font-family:'Syne',sans-serif;padding:2px 5px;border-radius:20px;opacity:0;transition:opacity 0.18s;}
.book-item:hover .prog-chip{opacity:1;}

.book-tt{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:20;min-width:130px;max-width:200px;white-space:normal;box-shadow:0 8px 28px rgba(0,0,0,0.6);}
.book-item:hover .book-tt{opacity:1;}
.tt-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;color:var(--text);margin-bottom:2px;}
.tt-author{font-size:0.7rem;color:var(--muted);margin-bottom:4px;}
.tt-stars{font-size:0.72rem;color:var(--accent);}

.shelf-empty{padding:36px;text-align:center;color:var(--muted);font-size:0.85rem;width:100%;}

.empty-all{display:flex;flex-direction:column;align-items:center;padding:72px 24px;gap:14px;color:var(--muted);}
.empty-all .big{font-size:3.5rem;}
.empty-all p{font-size:0.9rem;text-align:center;max-width:280px;line-height:1.6;}

.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:20px 14px;}
.grid-book{cursor:pointer;text-align:center;transition:transform 0.18s;}
.grid-book:hover{transform:translateY(-6px);}
.grid-label{margin-top:6px;font-size:0.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.8);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-hdr h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;}
.modal-x{background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-x:hover{background:var(--border);color:var(--text);}

.cover-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:18px;position:relative;}
.cover-zone:hover,.cover-zone.dragover{border-color:var(--accent);background:rgba(232,164,74,0.06);}
.cover-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.cover-prev{width:78px;height:118px;object-fit:cover;border-radius:4px;margin:0 auto 8px;display:block;box-shadow:0 4px 16px rgba(0,0,0,0.5);}
.cover-icon{font-size:2rem;margin-bottom:6px;}
.cover-hint{font-size:0.78rem;color:var(--muted);}
.cover-hint strong{color:var(--accent);}

.field{margin-bottom:15px;}
.field label{display:block;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:500;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:0.9rem;transition:border-color 0.2s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{height:70px;resize:vertical;}
.field input::placeholder{color:var(--muted);}
.field select option{background:var(--surface2);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.stars-row{display:flex;gap:6px;}
.star{font-size:1.6rem;color:var(--border);cursor:pointer;transition:color 0.15s,transform 0.1s;}
.star:hover,.star.lit{color:var(--accent);}
.star:hover{transform:scale(1.15);}

.mactions{display:flex;gap:10px;margin-top:22px;}
.btn-p{flex:1;padding:12px;background:var(--accent);color:#0f0f13;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;transition:background 0.18s;}
.btn-p:hover{background:#f0b55a;}
.btn-s{padding:12px 20px;background:var(--surface2);color:var(--muted);border:none;border-radius:10px;font-family:'Instrument Sans',sans-serif;font-size:0.9rem;cursor:pointer;transition:background 0.18s;}
.btn-s:hover{background:var(--border);color:var(--text);}
.btn-d{padding:12px 14px;background:rgba(224,82,82,0.12);color:var(--red);border:1.5px solid rgba(224,82,82,0.22);border-radius:10px;font-size:0.9rem;cursor:pointer;transition:background 0.18s;}
.btn-d:hover{background:rgba(224,82,82,0.22);}

/* DETAIL */
.det-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,0.8);display:flex;flex-direction:column;gap:18px;}
.det-top{display:flex;gap:18px;}
.det-cover{width:92px;min-width:92px;height:138px;border-radius:4px 9px 9px 4px;object-fit:cover;box-shadow:-4px 0 10px rgba(0,0,0,0.65),5px 7px 20px rgba(0,0,0,0.55);}
.det-ph{width:92px;min-width:92px;height:138px;border-radius:4px 9px 9px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:2.2rem;box-shadow:-4px 0 10px rgba(0,0,0,0.65),5px 7px 20px rgba(0,0,0,0.55);position:relative;overflow:hidden;}
.det-ph::before{content:'';position:absolute;left:0;top:0;bottom:0;width:10px;background:rgba(0,0,0,0.28);}
.det-info{flex:1;}
.det-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;line-height:1.25;margin-bottom:4px;}
.det-author{font-size:0.83rem;color:var(--muted);margin-bottom:10px;}
.det-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:500;margin-bottom:8px;}
.det-stars{font-size:0.9rem;color:var(--accent);letter-spacing:2px;}
.det-meta{font-size:0.76rem;color:var(--muted);margin-top:5px;}

.det-prog{background:var(--surface2);border-radius:10px;padding:14px;}
.det-prog-hdr{display:flex;justify-content:space-between;font-size:0.76rem;color:var(--muted);margin-bottom:8px;}
.det-prog-hdr span{color:var(--accent);font-weight:500;}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 0.4s;}

.det-notes{background:var(--surface2);border-radius:10px;padding:14px;}
.det-notes-lbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;font-weight:500;}
.det-notes-txt{font-size:0.84rem;color:rgba(240,239,248,0.72);line-height:1.65;font-style:italic;}

.det-actions{display:flex;gap:10px;}

/* status colors */
.s-gelesen{background:rgba(76,175,125,0.15);color:var(--green);}
.s-lese{background:rgba(232,164,74,0.15);color:var(--accent);}
.s-wunsch{background:rgba(91,141,238,0.15);color:var(--blue);}
.s-sub{background:rgba(224,82,82,0.15);color:var(--red);}
.s-gekauft{background:rgba(155,127,232,0.15);color:var(--purple);}
.s-abgebrochen{background:rgba(122,121,138,0.15);color:var(--muted);}

.pip-gelesen{background:var(--green);}
.pip-lese{background:var(--accent);}
.pip-wunsch{background:var(--blue);}
.pip-sub{background:var(--red);}
.pip-gekauft{background:var(--purple);}
.pip-abgebrochen{background:var(--muted);}

/* placeholder palette */
.pal-0{background:linear-gradient(135deg,#2d1b4e,#5b3080);}
.pal-1{background:linear-gradient(135deg,#1a3a2a,#2d6a4a);}
.pal-2{background:linear-gradient(135deg,#3a1a1a,#8a3a2a);}
.pal-3{background:linear-gradient(135deg,#1a2a4a,#2a4a8a);}
.pal-4{background:linear-gradient(135deg,#3a2a1a,#8a5a2a);}
.pal-5{background:linear-gradient(135deg,#1a3a3a,#2a7a6a);}
.pal-6{background:linear-gradient(135deg,#2a1a3a,#6a3a7a);}

@media(max-width:600px){
  header{padding:14px 16px;}
  nav{padding:10px 16px 0;}
  .main{padding:18px 16px;}
  .header-stats{display:none;}
  .shelf{padding:14px 12px 0;gap:10px;}
  .book-cover,.book-ph{width:62px;height:94px;}
  .ph-emoji{font-size:1.2rem;}
}
</style>
</head>
<body>

<header>
  <div class="logo">buch<span>regal</span></div>
  <div class="header-stats" id="hstats"></div>
  <button class="add-btn" onclick="openAdd()">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>
    Buch hinzufügen
  </button>
</header>

<nav id="navTabs"></nav>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5" stroke="#7a798a" stroke-width="1.8"/><path d="M11 11l3 3" stroke="#7a798a" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Titel, Autor suchen…" oninput="render()">
    </div>
  </div>
  <div id="mainContent"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addOverlay" onclick="bgClick(event,'addOverlay')">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="mTitle">Buch hinzufügen</h2>
      <button class="modal-x" onclick="closeAdd()">✕</button>
    </div>

    <div class="cover-zone" id="coverZone"
         ondragover="czDragOver(event)" ondragleave="czDragLeave(event)" ondrop="czDrop(event)">
      <input type="file" accept="image/*" id="coverInput" onchange="coverFileChange(event)">
      <div id="coverPrev">
        <div class="cover-icon">🖼</div>
        <div class="cover-hint">Cover hochladen<br><strong>Klicken oder Bild reinziehen</strong></div>
      </div>
    </div>

    <div class="field"><label>Titel *</label><input type="text" id="fTitle" placeholder="Buchtitel"></div>
    <div class="field"><label>Autor/in</label><input type="text" id="fAuthor" placeholder="Autor"></div>
    <div class="row2">
      <div class="field"><label>Genre</label><input type="text" id="fGenre" placeholder="z. B. Fantasy"></div>
      <div class="field">
        <label>Status *</label>
        <select id="fStatus" onchange="toggleProg()">
          <option value="wunsch">🔖 Wunschliste</option>
          <option value="gekauft">🛒 Gekauft</option>
          <option value="sub">📦 SUB</option>
          <option value="lese">📖 Lese gerade</option>
          <option value="gelesen">✅ Gelesen</option>
          <option value="abgebrochen">❌ Abgebrochen</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Seiten gesamt</label><input type="number" id="fPages" placeholder="z. B. 348" min="1"></div>
      <div class="field" id="progWrap" style="display:none"><label>Aktuelle Seite</label><input type="number" id="fProg" placeholder="z. B. 120" min="0"></div>
    </div>
    <div class="field">
      <label>Bewertung</label>
      <div class="stars-row">
        <span class="star" data-v="1" onclick="setStar(1)">★</span>
        <span class="star" data-v="2" onclick="setStar(2)">★</span>
        <span class="star" data-v="3" onclick="setStar(3)">★</span>
        <span class="star" data-v="4" onclick="setStar(4)">★</span>
        <span class="star" data-v="5" onclick="setStar(5)">★</span>
      </div>
    </div>
    <div class="field"><label>Notizen</label><textarea id="fNotes" placeholder="Gedanken, Zitate, Erinnerungen…"></textarea></div>

    <div class="mactions">
      <button class="btn-s" onclick="closeAdd()">Abbrechen</button>
      <button id="delBtn" class="btn-d" style="display:none" onclick="deleteBook()">Löschen</button>
      <button class="btn-p" onclick="saveBook()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detOverlay" onclick="bgClick(event,'detOverlay')">
  <div class="det-modal" id="detContent"></div>
</div>

<script>
const LABEL={gelesen:'Gelesen',lese:'Lese gerade',wunsch:'Wunschliste',sub:'SUB',gekauft:'Gekauft',abgebrochen:'Abgebrochen'};
const EMOJI={wunsch:'🔖',gekauft:'🛒',sub:'📦',lese:'📖',gelesen:'✅',abgebrochen:'❌'};
const TABS=[{id:'alle',l:'Alle'},{id:'lese',l:'Lese gerade'},{id:'gelesen',l:'Gelesen'},{id:'sub',l:'SUB'},{id:'wunsch',l:'Wunschliste'},{id:'gekauft',l:'Gekauft'},{id:'abgebrochen',l:'Abgebrochen'}];

let books=[], activeTab='alle', editId=null, curRating=0, coverData=null;

function load(){try{books=JSON.parse(localStorage.getItem('brl2')||'[]');}catch{books=[];}}
function persist(){localStorage.setItem('brl2',JSON.stringify(books));}
function pal(t){return(t.charCodeAt(0)||0)%7;}
function genreEmoji(g){if(!g)return'📚';const s=g.toLowerCase();if(s.includes('fantasy')||s.includes('magie'))return'🔮';if(s.includes('krimi')||s.includes('thriller'))return'🔪';if(s.includes('sci')||s.includes(' sf'))return'🚀';if(s.includes('roman')||s.includes('liebe'))return'💌';if(s.includes('natur'))return'🌿';if(s.includes('histor')||s.includes('geschich'))return'🏛';if(s.includes('horror'))return'💀';return'📚';}
function stars(r){return r?'★'.repeat(r)+'☆'.repeat(5-r):'';}
function pct(b){return(!b.pages||!b.progress)?0:Math.min(100,Math.round(b.progress/b.pages*100));}

function coverEl(b,w,h,cls){
  if(b.cover)return`<img class="${cls}" src="${b.cover}" style="width:${w}px;height:${h}px" alt="">`;
  const p=pal(b.title),e=genreEmoji(b.genre);
  return`<div class="book-ph pal-${p}" style="width:${w}px;height:${h}px"><span class="ph-emoji">${e}</span><span class="ph-title">${b.title}</span></div>`;
}

function shelfBookEl(b){
  const prog=b.status==='lese'&&b.pages&&b.progress?`<div class="prog-chip">${pct(b)}%</div>`:'';
  const s=stars(b.rating);
  return`<div class="book-item" onclick="openDet('${b.id}')">
    ${coverEl(b,78,118,'book-cover')}
    <div class="status-pip pip-${b.status}"></div>
    ${prog}
    <div class="book-tt"><div class="tt-title">${b.title}</div><div class="tt-author">${b.author||'—'}</div>${s?`<div class="tt-stars">${s}</div>`:''}</div>
  </div>`;
}

function renderHeader(){
  const t=books.length,g=books.filter(b=>b.status==='gelesen').length,s=books.filter(b=>b.status==='sub').length,l=books.filter(b=>b.status==='lese').length;
  document.getElementById('hstats').innerHTML=[[t,'Bücher'],[g,'Gelesen'],[s,'SUB'],[l,'Aktiv']].map(([n,lb])=>`<div class="hstat"><div class="hstat-num">${n}</div><div class="hstat-label">${lb}</div></div>`).join('');
}
function renderNav(){
  document.getElementById('navTabs').innerHTML=TABS.map(t=>{
    const c=t.id==='alle'?books.length:books.filter(b=>b.status===t.id).length;
    return`<div class="nav-tab ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')"><span class="nav-dot"></span>${t.l}<span class="nav-count">${c}</span></div>`;
  }).join('');
}
function render(){
  renderHeader(); renderNav();
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let list=books.filter(b=>(activeTab==='alle'||b.status===activeTab)&&(!q||b.title.toLowerCase().includes(q)||(b.author||'').toLowerCase().includes(q)));
  const el=document.getElementById('mainContent');
  if(!list.length){el.innerHTML=`<div class="empty-all"><div class="big">📭</div><p>Noch keine Bücher hier.<br>Füge dein erstes Buch hinzu!</p></div>`;return;}
  if(q){el.innerHTML=`<div class="grid-view">${list.map(b=>`<div class="grid-book" onclick="openDet('${b.id}')">${coverEl(b,88,132,'book-cover')}<div class="grid-label">${b.title}</div></div>`).join('')}</div>`;return;}
  if(activeTab!=='alle'){el.innerHTML=`<div class="shelf-section"><div class="shelf">${list.map(shelfBookEl).join('')}<div class="shelf-floor"></div></div></div>`;return;}
  const order=['lese','sub','gelesen','wunsch','gekauft','abgebrochen'];
  el.innerHTML=order.map(st=>{const g=list.filter(b=>b.status===st);if(!g.length)return'';return`<div class="shelf-section"><div class="shelf-label">${EMOJI[st]} ${LABEL[st]}</div><div class="shelf">${g.map(shelfBookEl).join('')}<div class="shelf-floor"></div></div></div>`;}).join('');
}
function setTab(id){activeTab=id;render();}

function openAdd(){
  editId=null;curRating=0;coverData=null;
  document.getElementById('mTitle').textContent='Buch hinzufügen';
  ['fTitle','fAuthor','fGenre','fPages','fProg','fNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fStatus').value='wunsch';
  document.getElementById('delBtn').style.display='none';
  resetCover(); updateStars(); toggleProg();
  document.getElementById('addOverlay').classList.add('open');
}
function openEdit(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  editId=id;curRating=b.rating||0;coverData=b.cover||null;
  document.getElementById('mTitle').textContent='Buch bearbeiten';
  document.getElementById('fTitle').value=b.title;
  document.getElementById('fAuthor').value=b.author||'';
  document.getElementById('fGenre').value=b.genre||'';
  document.getElementById('fStatus').value=b.status;
  document.getElementById('fPages').value=b.pages||'';
  document.getElementById('fProg').value=b.progress||'';
  document.getElementById('fNotes').value=b.notes||'';
  document.getElementById('delBtn').style.display='flex';
  if(b.cover)showCover(b.cover);else resetCover();
  updateStars();toggleProg();
  document.getElementById('detOverlay').classList.remove('open');
  document.getElementById('addOverlay').classList.add('open');
}
function closeAdd(){document.getElementById('addOverlay').classList.remove('open');}
function toggleProg(){document.getElementById('progWrap').style.display=document.getElementById('fStatus').value==='lese'?'block':'none';}
function setStar(v){curRating=curRating===v?0:v;updateStars();}
function updateStars(){document.querySelectorAll('.star').forEach(s=>s.classList.toggle('lit',parseInt(s.dataset.v)<=curRating));}
function saveBook(){
  const t=document.getElementById('fTitle').value.trim();
  if(!t){alert('Bitte einen Titel eingeben.');return;}
  const b={id:editId||Date.now().toString(),title:t,cover:coverData,author:document.getElementById('fAuthor').value.trim(),genre:document.getElementById('fGenre').value.trim(),status:document.getElementById('fStatus').value,pages:parseInt(document.getElementById('fPages').value)||null,progress:parseInt(document.getElementById('fProg').value)||null,rating:curRating,notes:document.getElementById('fNotes').value.trim(),added:editId?(books.find(x=>x.id===editId)||{}).added:new Date().toISOString()};
  books=editId?books.map(x=>x.id===editId?b:x):[...books,b];
  persist();closeAdd();render();
}
function deleteBook(){if(!confirm('Buch wirklich löschen?'))return;books=books.filter(x=>x.id!==editId);persist();closeAdd();render();}

function openDet(id){
  const b=books.find(x=>x.id===id);if(!b)return;
  const s=stars(b.rating),hp=b.status==='lese'&&b.pages;
  const cov=b.cover?`<img class="det-cover" src="${b.cover}" alt="">`:`<div class="det-ph pal-${pal(b.title)}"><span style="font-size:2.2rem">${genreEmoji(b.genre)}</span></div>`;
  document.getElementById('detContent').innerHTML=`
    <div class="det-top">
      ${cov}
      <div class="det-info">
        <div class="det-title">${b.title}</div>
        <div class="det-author">${b.author||'Unbekannter Autor'}</div>
        <div class="det-badge s-${b.status}">${EMOJI[b.status]} ${LABEL[b.status]}</div>
        ${s?`<div class="det-stars">${s}</div>`:''}
        ${b.genre?`<div class="det-meta">📌 ${b.genre}</div>`:''}
        ${b.pages?`<div class="det-meta">📄 ${b.pages} Seiten${b.progress&&b.status==='lese'?' · Seite '+b.progress:''}</div>`:''}
      </div>
    </div>
    ${hp?`<div class="det-prog"><div class="det-prog-hdr">Lesefortschritt <span>${pct(b)}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct(b)}%"></div></div></div>`:''}
    ${b.notes?`<div class="det-notes"><div class="det-notes-lbl">Notizen</div><div class="det-notes-txt">${b.notes}</div></div>`:''}
    <div class="det-actions">
      <button class="btn-s" style="flex:1" onclick="document.getElementById('detOverlay').classList.remove('open')">Schließen</button>
      <button class="btn-p" style="flex:1" onclick="openEdit('${b.id}')">✎ Bearbeiten</button>
    </div>`;
  document.getElementById('detOverlay').classList.add('open');
}

// cover upload
function coverFileChange(e){const f=e.target.files[0];if(f)readCover(f);}
function czDragOver(e){e.preventDefault();document.getElementById('coverZone').classList.add('dragover');}
function czDragLeave(){document.getElementById('coverZone').classList.remove('dragover');}
function czDrop(e){e.preventDefault();document.getElementById('coverZone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))readCover(f);}
function readCover(f){const r=new FileReader();r.onload=ev=>{coverData=ev.target.result;showCover(coverData);};r.readAsDataURL(f);}
function showCover(src){document.getElementById('coverPrev').innerHTML=`<img class="cover-prev" src="${src}" alt="Cover"><div class="cover-hint"><strong>Anderes Bild wählen</strong></div>`;}
function resetCover(){coverData=null;document.getElementById('coverPrev').innerHTML=`<div class="cover-icon">🖼</div><div class="cover-hint">Cover hochladen<br><strong>Klicken oder Bild reinziehen</strong></div>`;}

function bgClick(e,id){if(e.target.id===id)document.getElementById(id).classList.remove('open');}
